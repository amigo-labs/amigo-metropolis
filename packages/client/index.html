<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Metropolis" />
    <meta
      name="description"
      content="Metropolis — a browser arena strategy-action game. Break the enemy base's gate. Solo vs AI, couch splitscreen, or online 1v1."
    />
    <meta name="theme-color" content="#0b0e14" />
    <title>Metropolis</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e14;
      }
      canvas {
        display: block;
      }
      .hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #cbd5e1;
        font: 12px/1.5 ui-monospace, monospace;
        white-space: pre-wrap;
        max-width: 46ch;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #lobby {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(7, 10, 18, 0.55);
        color: #e2e8f0;
        font: 15px/1.7 ui-monospace, monospace;
        z-index: 10;
      }
      .lobby-card {
        background: rgba(11, 14, 20, 0.92);
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 24px 32px;
        min-width: 340px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      }
      .lobby-card h1 {
        margin: 0 0 14px;
        font-size: 18px;
        letter-spacing: 0.04em;
      }
      .lobby-card b {
        color: #fbbf24;
      }
      #reticle {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.85);
        border-radius: 50%;
        box-shadow: 0 0 4px #000;
        pointer-events: none;
        will-change: transform;
      }
      body {
        cursor: crosshair;
      }

      /* --- Title screen / menu (Phase 7) ------------------------------------ */
      .menu {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        /* The live demo battle renders on the canvas behind this overlay; a
           light vignette keeps the opaque card legible without hiding it. */
        background: linear-gradient(rgba(6, 8, 13, 0.2), rgba(6, 8, 13, 0.55));
        color: #e2e8f0;
        font: 14px/1.6 ui-sans-serif, system-ui, sans-serif;
        z-index: 20;
        overflow: auto;
        transition: opacity 0.4s;
      }
      .menu.is-leaving {
        opacity: 0;
        pointer-events: none;
      }
      #fade-cover {
        position: fixed;
        inset: 0;
        background: #06080d;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 30;
      }
      #fade-cover.is-on {
        opacity: 1;
      }
      .menu-card {
        width: 100%;
        max-width: 420px;
        background: rgba(11, 14, 20, 0.94);
        border: 1px solid #26304a;
        border-radius: 14px;
        padding: 28px 28px 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }
      .menu-kicker {
        color: #7ef2ff;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .menu-title {
        margin: 6px 0 10px;
        font-size: 40px;
        font-weight: 800;
        letter-spacing: 0.02em;
        line-height: 1.05;
        background: linear-gradient(180deg, #ffffff, #9fb2cc);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .menu-objective {
        margin: 0 0 18px;
        color: #b6c2d4;
      }
      .menu-modes {
        display: grid;
        gap: 8px;
      }
      .menu-mode {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #2b3650;
        border-radius: 10px;
        background: #131a29;
        color: #e2e8f0;
        font: inherit;
        text-align: left;
        cursor: pointer;
        transition:
          border-color 0.12s,
          background 0.12s,
          transform 0.06s;
      }
      .menu-mode:hover {
        border-color: #3d4d72;
        background: #172136;
      }
      .menu-mode:active {
        transform: translateY(1px);
      }
      .menu-mode.is-active {
        border-color: #7ef2ff;
        background: #16273a;
      }
      .menu-mode b {
        font-size: 16px;
      }
      .menu-mode span {
        color: #8ea0ba;
        font-size: 12px;
      }
      .menu-arenas {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      .menu-arenas-label {
        flex: 0 0 auto;
        color: #8ea0ba;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .menu-arena {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid #2b3650;
        border-radius: 999px;
        background: #131a29;
        color: #b6c2d4;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        transition:
          border-color 0.12s,
          background 0.12s,
          color 0.12s;
      }
      .menu-arena:hover {
        border-color: #3d4d72;
        background: #172136;
      }
      .menu-arena.is-active {
        border-color: #7ef2ff;
        background: #16273a;
        color: #e2e8f0;
      }
      .menu-panel,
      .menu-drawer {
        margin-top: 12px;
        padding: 14px;
        border: 1px solid #26304a;
        border-radius: 10px;
        background: #0e1420;
      }
      .menu-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      .menu-label {
        flex: 0 0 78px;
        color: #b6c2d4;
      }
      .menu-value {
        flex: 0 0 34px;
        text-align: right;
        color: #7ef2ff;
        font-variant-numeric: tabular-nums;
      }
      .menu-slider {
        flex: 1;
        accent-color: #7ef2ff;
      }
      .menu-select {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid #2b3650;
        border-radius: 8px;
        background: #0b0f18;
        color: #e2e8f0;
        font: inherit;
        cursor: pointer;
      }
      .menu-select:focus {
        outline: none;
        border-color: #7ef2ff;
      }
      .menu-code {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #2b3650;
        border-radius: 8px;
        background: #0b0f18;
        color: #fff;
        font: 600 18px/1 ui-monospace, monospace;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
      .menu-code:focus {
        outline: none;
        border-color: #7ef2ff;
      }
      .menu-go {
        width: 100%;
        margin-top: 6px;
        padding: 11px 14px;
        border: 0;
        border-radius: 9px;
        background: #7ef2ff;
        color: #06222b;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .menu-go:hover {
        background: #a6f6ff;
      }
      .menu-go--ghost {
        margin-top: 8px;
        background: transparent;
        border: 1px solid #2b3650;
        color: #cdd8e8;
        font-weight: 600;
      }
      .menu-go--ghost:hover {
        border-color: #3d4d72;
        background: #131a29;
      }
      .menu-lobby {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 0;
        border-bottom: 1px solid #1c2436;
      }
      .menu-lobby-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #cdd8e8;
      }
      .menu-lobby .menu-go {
        width: auto;
        margin-top: 0;
        padding: 7px 12px;
      }
      .menu-lobby .menu-code {
        letter-spacing: normal;
        text-transform: none;
        font-size: 14px;
        padding: 7px 10px;
      }
      .menu-check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        color: #b6c2d4;
        cursor: pointer;
      }
      .menu-check input {
        accent-color: #7ef2ff;
      }
      .menu-hint {
        margin: 8px 0 0;
        color: #8ea0ba;
        font-size: 12.5px;
      }
      .menu-hint a {
        color: #7ef2ff;
      }
      .menu-err {
        margin-top: 8px;
        color: #fca5a5;
        font-size: 12.5px;
        min-height: 1em;
      }
      .menu-footer {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      .menu-link {
        padding: 6px 10px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        color: #9fb0c8;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }
      .menu-link:hover {
        color: #e2e8f0;
      }
      .menu-link.is-active {
        color: #7ef2ff;
        border-color: #26304a;
      }
      .menu-link--accent {
        margin-left: auto;
        color: #fbbf24;
      }
      .menu-h2 {
        margin: 4px 0 8px;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8ea0ba;
      }
      .menu-h2:not(:first-child) {
        margin-top: 14px;
      }
      .menu-keys {
        display: grid;
        gap: 4px;
      }
      .menu-key-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .menu-key-row kbd {
        flex: 0 0 140px;
        color: #dbe4f0;
        font: 12px/1.6 ui-monospace, monospace;
      }
      .menu-key-row span {
        color: #8ea0ba;
        font-size: 13px;
      }
      .menu-credits {
        margin-top: 14px;
        color: #55617a;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="reticle"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
