<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Metropolis — Phase 0 sandbox</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e14;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #cbd5e1;
        font: 12px/1.5 ui-monospace, monospace;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #reticle {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.85);
        border-radius: 50%;
        box-shadow: 0 0 4px #000;
        pointer-events: none;
        will-change: transform;
      }
      body {
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <div id="hud"></div>
    <div id="reticle"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
